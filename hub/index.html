<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<body class="app-body" data-page="hub">
  <div class="page-shell">
    <div class="glow-orb glow-orb-teal-left"></div>
    <div class="glow-orb glow-orb-blue-right"></div>

    <div class="page-wrap">
      <section class="page-hero compact">
        <div class="container">
          <div class="hero-copy">
            <div class="section-badge">Internal Access</div>
            <h1 class="hero-title">Internal Hub</h1>
            <p class="hero-text">A quiet control surface for accessing project routes, tools, and portfolio entry points without exposing them on the public landing page.</p>
          </div>
        </div>
      </section>

      <section class="section section-tight">
        <div class="container">
          <div class="control-grid">
            <section class="control-card card-glass">
              <h2 class="card-title">Portfolio</h2>
              <div class="control-links">
                <a href="/portfolio/">Main Portfolio</a>
                <a href="/portfolio/ai-systems-library.html">AI Systems Library</a>
              </div>

            <section class="control-card card-glass">
              <h2 class="card-title">Tools</h2>
              <div class="control-links">
                <a href="/tools/prompt-architect/">Prompt Architect (RISEN)</a>
              </div>
            </section>

            <section class="control-card card-glass">
              <h2 class="card-title">Projects</h2>
              <div class="control-links">
                <a href="/game/">Game Project</a>
              </div>
            </section>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="/js/script.js"></script>
